<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FleetGuard Driver</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0e14;--bg2:#111720;--bg3:#181f2e;
  --border:#1e293b;--border2:#2d3f5a;
  --text:#f0f6ff;--text2:#7a91b0;--text3:#3d5070;
  --green:#16c972;--amber:#f0a500;--red:#ff3d3d;--blue:#3b9eff;
}
html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;height:100%;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}

/* STATUS BAR */
.statusbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);}
.conn-wrap{display:flex;align-items:center;gap:7px;}
.conn-dot{width:9px;height:9px;border-radius:50%;background:var(--text3);transition:background .4s;flex-shrink:0;}
.conn-dot.connected{background:var(--green);animation:pulse 2s infinite;}
.conn-dot.error{background:var(--red);}
.conn-label{font-size:12px;color:var(--text2);font-family:'Orbitron',monospace;letter-spacing:.5px;}
.driver-id-lbl{font-size:11px;color:var(--text3);font-family:'Orbitron',monospace;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(22,201,114,.5)}50%{box-shadow:0 0 0 7px rgba(22,201,114,0)}}

/* SETTINGS PANEL */
.settings-toggle{width:100%;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.settings-toggle span{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',monospace;}
.settings-toggle .arrow{font-size:12px;color:var(--text3);transition:transform .2s;}
.settings-toggle .arrow.open{transform:rotate(180deg);}
.settings-body{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:none;gap:12px;flex-direction:column;}
.settings-body.open{display:flex;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
.field input,.field select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:9px 12px;border-radius:7px;font-family:'IBM Plex Sans',sans-serif;outline:none;width:100%;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--blue);}
.save-btn{padding:10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;transition:all .15s;text-align:center;}
.save-btn:active{background:var(--border2);}

/* GAUGE */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 16px 0;width:100%;}
canvas{display:block;max-width:100%;}
.speed-display{display:flex;flex-direction:column;align-items:center;margin-top:-18px;}
.speed-num{font-family:'Orbitron',monospace;font-size:80px;font-weight:900;line-height:1;letter-spacing:-3px;transition:color .3s;}
.speed-unit{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:4px;color:var(--text2);margin-top:2px;}
.speed-zone{font-size:13px;padding:6px 18px;border-radius:20px;margin-top:10px;font-weight:500;transition:all .3s;text-align:center;}
.speed-zone.safe{background:rgba(22,201,114,.1);color:var(--green);border:1px solid rgba(22,201,114,.3);}
.speed-zone.warn{background:rgba(240,165,0,.1);color:var(--amber);border:1px solid rgba(240,165,0,.3);}
.speed-zone.danger{background:rgba(255,61,61,.12);color:var(--red);border:1px solid rgba(255,61,61,.4);animation:flash .5s infinite;}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.55}}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-top:22px;width:100%;}
.metric{background:var(--bg2);padding:15px 8px;text-align:center;}
.metric-val{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;}
.metric-val.green{color:var(--green);}
.metric-val.amber{color:var(--amber);}
.metric-val.red{color:var(--red);}
.metric-label{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:5px;}

/* GPS INFO */
.gps-row{display:flex;flex-wrap:wrap;gap:8px;padding:10px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;color:var(--text3);}
.gps-chip{display:flex;gap:4px;align-items:center;}
.gps-chip span{color:var(--text2);font-family:'Orbitron',monospace;font-size:11px;}

/* SEND STATUS */
.send-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.send-info{font-size:11px;color:var(--text3);}
.send-tick{font-family:'Orbitron',monospace;font-size:11px;}
.send-tick.ok{color:var(--green);}
.send-tick.err{color:var(--red);}
.send-tick.sending{color:var(--amber);}

/* LOG */
.log-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;}
.log-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-family:'Orbitron',monospace;}
.log-clear{font-size:11px;color:var(--text3);cursor:pointer;border:1px solid var(--border2);padding:4px 12px;border-radius:4px;background:transparent;font-family:'IBM Plex Sans',sans-serif;}
.log-clear:active{background:var(--bg3);}
.log-list{padding:0 16px 16px;max-height:180px;overflow-y:auto;}
.log-item{display:grid;grid-template-columns:58px 68px 1fr 64px;gap:4px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-time{font-family:'Orbitron',monospace;font-size:10px;color:var(--text3);}
.log-spd{font-family:'Orbitron',monospace;font-weight:700;font-size:12px;}
.log-spd.lo{color:var(--green);}
.log-spd.mid{color:var(--amber);}
.log-spd.hi{color:var(--red);}
.log-loc{font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.log-sent{font-size:10px;font-family:'Orbitron',monospace;text-align:right;}
.log-sent.ok{color:var(--green);}
.log-sent.fail{color:var(--red);}
.log-empty{text-align:center;padding:20px 0;font-size:12px;color:var(--text3);}

/* START BTN */
.start-wrap{padding:14px 16px;background:var(--bg2);border-top:1px solid var(--border);margin-top:auto;}
.start-btn{width:100%;padding:18px;border-radius:12px;border:none;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .15s;}
.start-btn.start{background:var(--green);color:#001a0c;}
.start-btn.start:active{opacity:.85;}
.start-btn.stop{background:rgba(255,61,61,.15);color:var(--red);border:2px solid rgba(255,61,61,.4);}
.start-btn.stop:active{background:rgba(255,61,61,.25);}

/* DEMO BANNER */
.demo-banner{background:rgba(59,158,255,.08);border:1px solid rgba(59,158,255,.2);border-radius:8px;margin:12px 16px 0;padding:10px 14px;font-size:12px;color:var(--blue);text-align:center;line-height:1.5;}
</style>
</head>
<body>
<div class="app">

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="conn-wrap">
    <div class="conn-dot" id="conn-dot"></div>
    <span class="conn-label" id="conn-label">TIDAK AKTIF</span>
  </div>
  <span class="driver-id-lbl" id="driver-id-label">ID: DRV-001</span>
</div>

<!-- SETTINGS TOGGLE -->
<div class="settings-toggle" onclick="toggleSettings()">
  <span>⚙ Pengaturan</span>
  <span class="arrow" id="settings-arrow">▼</span>
</div>
<div class="settings-body" id="settings-body">
  <div class="field">
    <label>Driver ID</label>
    <input type="text" id="cfg-driver" value="DRV-001" maxlength="20" placeholder="Contoh: DRV-001">
  </div>
  <div class="field">
    <label>URL Server (isi setelah deploy)</label>
    <input type="url" id="cfg-url" placeholder="https://fleetguard-xxxx.up.railway.app/v1/speed">
  </div>
  <div class="field">
    <label>Interval Kirim Data</label>
    <select id="cfg-interval">
      <option value="3000">Setiap 3 detik</option>
      <option value="5000" selected>Setiap 5 detik</option>
      <option value="10000">Setiap 10 detik</option>
      <option value="30000">Setiap 30 detik</option>
    </select>
  </div>
  <div class="field">
    <label>Batas Kecepatan Peringatan</label>
    <select id="cfg-limit">
      <option value="60">60 km/h</option>
      <option value="80" selected>80 km/h</option>
      <option value="100">100 km/h</option>
      <option value="120">120 km/h</option>
    </select>
  </div>
  <button class="save-btn" onclick="saveSettings()">✓ Simpan Pengaturan</button>
</div>

<!-- GAUGE -->
<div class="gauge-wrap">
  <canvas id="gauge" width="320" height="188"></canvas>
  <div class="speed-display">
    <span class="speed-num" id="spd-num" style="color:var(--text)">0</span>
    <span class="speed-unit">KM / H</span>
    <span class="speed-zone safe" id="spd-zone">Siap — tekan Mulai Tracking</span>
  </div>
</div>

<!-- METRICS -->
<div class="metrics">
  <div class="metric">
    <div class="metric-val green" id="m-max">0</div>
    <div class="metric-label">Maks km/h</div>
  </div>
  <div class="metric">
    <div class="metric-val" id="m-avg" style="color:var(--text)">0</div>
    <div class="metric-label">Rata-rata</div>
  </div>
  <div class="metric">
    <div class="metric-val amber" id="m-dur">0:00</div>
    <div class="metric-label">Durasi</div>
  </div>
</div>

<!-- GPS INFO -->
<div class="gps-row">
  <div class="gps-chip">LAT <span id="g-lat">—</span></div>
  <div class="gps-chip">LNG <span id="g-lng">—</span></div>
  <div class="gps-chip">AKURASI <span id="g-acc">—</span></div>
  <div class="gps-chip">ARAH <span id="g-hdg">—</span></div>
</div>

<!-- SEND STATUS -->
<div class="send-row">
  <span class="send-info" id="last-send">Belum mengirim data</span>
  <span class="send-tick" id="send-tick">—</span>
</div>

<!-- LOG -->
<div class="log-header">
  <span class="log-title">Log Pengiriman</span>
  <button class="log-clear" onclick="clearLog()">Hapus</button>
</div>
<div class="log-list" id="log-list">
  <div class="log-empty" id="log-empty">Log pengiriman akan muncul di sini.</div>
</div>

<!-- START BUTTON -->
<div class="start-wrap">
  <button class="start-btn start" id="start-btn" onclick="toggleTracking()">MULAI TRACKING</button>
</div>

</div><!-- .app -->

<script>
// ── STATE ──
let tracking=false, watchId=null, sendTimer=null, durTimer=null;
let maxSpd=0, totalSpd=0, spdCount=0, durSec=0;
let currentSpd=0, currentLat=0, currentLng=0, currentAcc=0, currentHdg=null;
let logItems=[];
let speedLimit=80;

// ── SETTINGS ──
function toggleSettings(){
  const body=document.getElementById('settings-body');
  const arrow=document.getElementById('settings-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}
function saveSettings(){
  speedLimit=parseInt(document.getElementById('cfg-limit').value)||80;
  const dId=document.getElementById('cfg-driver').value.trim()||'DRV-001';
  document.getElementById('driver-id-label').textContent='ID: '+dId;
  toggleSettings();
  showSendStatus('✓ Tersimpan','ok');
}
function loadSettings(){
  speedLimit=parseInt(document.getElementById('cfg-limit').value)||80;
}

// ── GAUGE ──
const gCanvas=document.getElementById('gauge');
const gCtx=gCanvas.getContext('2d');

function drawGauge(speed){
  // Scale canvas for device pixel ratio
  const dpr=window.devicePixelRatio||1;
  const logW=Math.min(window.innerWidth-32,320);
  gCanvas.style.width=logW+'px';
  gCanvas.style.height=Math.round(logW*188/320)+'px';

  const c=gCtx;
  const W=gCanvas.width, H=gCanvas.height;
  const cx=W/2, cy=Math.round(H*0.935), r=Math.round(W*0.455);
  c.clearRect(0,0,W,H);

  const sA=Math.PI, eA=2*Math.PI, total=eA-sA;

  // Track background
  c.beginPath(); c.arc(cx,cy,r,sA,eA);
  c.lineWidth=Math.round(r*0.096); c.strokeStyle='#1e293b'; c.stroke();

  // Zone colors
  [{f:0,t:.5,col:'rgba(22,201,114,.3)'},{f:.5,t:.75,col:'rgba(240,165,0,.3)'},{f:.75,t:1,col:'rgba(255,61,61,.3)'}]
  .forEach(z=>{
    c.beginPath(); c.arc(cx,cy,r,sA+z.f*total,sA+z.t*total);
    c.lineWidth=Math.round(r*0.096); c.strokeStyle=z.col; c.stroke();
  });

  // Tick marks
  const maxG=160;
  [0,20,40,60,80,100,120,140,160].forEach(t=>{
    const a=sA+(t/maxG)*total;
    const iR=r-Math.round(r*0.17), oR=r-Math.round(r*0.06);
    c.beginPath();
    c.moveTo(cx+Math.cos(a)*iR, cy+Math.sin(a)*iR);
    c.lineTo(cx+Math.cos(a)*oR, cy+Math.sin(a)*oR);
    c.lineWidth=1.5; c.strokeStyle='#2d3f5a'; c.stroke();
    if(t%40===0){
      const fs=Math.max(10,Math.round(r*0.075));
      c.fillStyle='#3d5070'; c.font='bold '+fs+'px Orbitron,monospace';
      c.textAlign='center'; c.textBaseline='middle';
      const lx=cx+Math.cos(a)*(r-Math.round(r*0.28));
      const ly=cy+Math.sin(a)*(r-Math.round(r*0.28));
      c.fillText(t,lx,ly);
    }
  });

  // Speed limit marker
  const limA=sA+(speedLimit/maxG)*total;
  c.beginPath();
  c.moveTo(cx+Math.cos(limA)*(r-Math.round(r*0.17)), cy+Math.sin(limA)*(r-Math.round(r*0.17)));
  c.lineTo(cx+Math.cos(limA)*(r+Math.round(r*0.06)), cy+Math.sin(limA)*(r+Math.round(r*0.06)));
  c.lineWidth=3; c.strokeStyle='#ff3d3d'; c.stroke();

  // Fill arc
  const fr=Math.min(speed/maxG,1), fa=sA+fr*total;
  const col=speed>=speedLimit*1.25?'#ff3d3d':speed>=speedLimit?'#f0a500':'#16c972';
  c.beginPath(); c.arc(cx,cy,r,sA,fa);
  c.lineWidth=Math.round(r*0.096); c.strokeStyle=col; c.lineCap='round'; c.stroke();

  // Needle
  const nLen=r-Math.round(r*0.13);
  c.beginPath();
  c.moveTo(cx+Math.cos(fa+Math.PI/2)*Math.round(r*0.075), cy+Math.sin(fa+Math.PI/2)*Math.round(r*0.075));
  c.lineTo(cx+Math.cos(fa)*nLen, cy+Math.sin(fa)*nLen);
  c.lineTo(cx+Math.cos(fa-Math.PI/2)*Math.round(r*0.075), cy+Math.sin(fa-Math.PI/2)*Math.round(r*0.075));
  c.closePath(); c.fillStyle='#ffffff'; c.fill();

  // Center hub
  c.beginPath(); c.arc(cx,cy,Math.round(r*0.075),0,2*Math.PI); c.fillStyle='#1e293b'; c.fill();
  c.beginPath(); c.arc(cx,cy,Math.round(r*0.038),0,2*Math.PI); c.fillStyle='#ffffff'; c.fill();
}
drawGauge(0);
window.addEventListener('resize',()=>drawGauge(currentSpd));

// ── ZONE DISPLAY ──
function updateZone(s){
  const z=document.getElementById('spd-zone');
  const n=document.getElementById('spd-num');
  if(s>=speedLimit*1.25){
    z.textContent='⚠ OVERSPEED — Kurangi Kecepatan!';
    z.className='speed-zone danger'; n.style.color='#ff3d3d';
  }else if(s>=speedLimit){
    z.textContent='Perhatian — Mendekati Batas';
    z.className='speed-zone warn'; n.style.color='#f0a500';
  }else{
    z.textContent='Kecepatan Aman';
    z.className='speed-zone safe'; n.style.color='var(--text)';
  }
}

// ── METRICS ──
function updateMetrics(){
  document.getElementById('m-max').textContent=maxSpd;
  document.getElementById('m-avg').textContent=spdCount>0?Math.round(totalSpd/spdCount):0;
  const m=Math.floor(durSec/60), s=durSec%60;
  document.getElementById('m-dur').textContent=m+':'+(s<10?'0':'')+s;
}

// ── LOG ──
function renderLog(){
  const el=document.getElementById('log-list');
  if(logItems.length===0){
    el.innerHTML='<div class="log-empty">Log pengiriman akan muncul di sini.</div>';
    return;
  }
  el.innerHTML=logItems.slice(0,50).map(item=>{
    const cls=item.speed>=(speedLimit*1.25)?'hi':item.speed>=speedLimit?'mid':'lo';
    return `<div class="log-item">
      <span class="log-time">${item.ts}</span>
      <span class="log-spd ${cls}">${item.speed} km/h</span>
      <span class="log-loc">${item.loc}</span>
      <span class="log-sent ${item.sent?'ok':'fail'}">${item.sent?'✓ OK':'✗ GAGAL'}</span>
    </div>`;
  }).join('');
}
function clearLog(){logItems=[];renderLog();}

// ── SEND STATUS ──
function showSendStatus(msg,cls){
  const el=document.getElementById('send-tick');
  el.textContent=msg; el.className='send-tick '+cls;
}

// ── SEND DATA ──
async function sendData(){
  const url=(document.getElementById('cfg-url').value||'').trim();
  const driverId=(document.getElementById('cfg-driver').value||'DRV-001').trim();

  if(!url){
    // Mode offline: simpan lokal saja
    const ts=new Date().toLocaleTimeString('id-ID');
    const loc=currentLat!==0?currentLat.toFixed(5)+','+currentLng.toFixed(5):'—';
    logItems.unshift({ts,speed:currentSpd,loc,sent:false});
    if(logItems.length>100) logItems.pop();
    renderLog();
    document.getElementById('last-send').textContent='Mode offline — URL server belum diisi';
    showSendStatus('— OFFLINE','');
    return;
  }

  const payload={
    driver_id:driverId,
    speed_kmh:currentSpd,
    latitude:currentLat,
    longitude:currentLng,
    accuracy_m:Math.round(currentAcc||0),
    heading_deg:currentHdg!=null?Math.round(currentHdg):null,
    timestamp:new Date().toISOString(),
    session_max_kmh:maxSpd,
    session_avg_kmh:spdCount>0?Math.round(totalSpd/spdCount):0,
    session_duration_sec:durSec,
    overspeed_alert:currentSpd>=speedLimit,
    speed_limit_kmh:speedLimit
  };

  document.getElementById('last-send').textContent='Mengirim...';
  showSendStatus('...','sending');

  try{
    const res=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
      signal:AbortSignal.timeout(6000)
    });
    const ok=res.ok;
    showSendStatus(ok?'✓ OK':'✗ ERR '+res.status, ok?'ok':'err');
    document.getElementById('last-send').textContent='Terakhir: '+new Date().toLocaleTimeString('id-ID');
    const loc=currentLat!==0?currentLat.toFixed(5)+','+currentLng.toFixed(5):'—';
    logItems.unshift({ts:new Date().toLocaleTimeString('id-ID'),speed:currentSpd,loc,sent:ok});
    if(logItems.length>100) logItems.pop();
    renderLog();
  }catch(e){
    showSendStatus('✗ TIMEOUT','err');
    document.getElementById('last-send').textContent='Gagal: '+e.message.slice(0,40);
    const loc=currentLat!==0?currentLat.toFixed(5)+','+currentLng.toFixed(5):'—';
    logItems.unshift({ts:new Date().toLocaleTimeString('id-ID'),speed:currentSpd,loc,sent:false});
    renderLog();
  }
}

// ── GPS ──
function onPosition(pos){
  const spd=pos.coords.speed;
  currentSpd=spd!=null&&spd>=0?Math.round(spd*3.6):0;
  currentLat=pos.coords.latitude;
  currentLng=pos.coords.longitude;
  currentAcc=pos.coords.accuracy||0;
  currentHdg=pos.coords.heading;

  document.getElementById('spd-num').textContent=currentSpd;
  document.getElementById('g-lat').textContent=currentLat.toFixed(5);
  document.getElementById('g-lng').textContent=currentLng.toFixed(5);
  document.getElementById('g-acc').textContent=Math.round(currentAcc)+'m';
  document.getElementById('g-hdg').textContent=currentHdg!=null?Math.round(currentHdg)+'°':'—';

  drawGauge(currentSpd);
  updateZone(currentSpd);

  if(currentSpd>maxSpd) maxSpd=currentSpd;
  totalSpd+=currentSpd; spdCount++;
  updateMetrics();
}

function onGeoError(err){
  const msgs={1:'Izin lokasi ditolak — aktifkan di pengaturan browser',2:'Sinyal GPS lemah',3:'Timeout GPS'};
  document.getElementById('spd-zone').textContent=msgs[err.code]||'GPS Error: '+err.message;
  document.getElementById('spd-zone').className='speed-zone danger';
  document.getElementById('conn-dot').className='conn-dot error';
  document.getElementById('conn-label').textContent='GPS GAGAL';
}

// ── TRACKING TOGGLE ──
function toggleTracking(){
  loadSettings();
  if(!tracking){
    if(!navigator.geolocation){
      alert('Browser ini tidak mendukung GPS.\nGunakan Chrome atau Safari versi terbaru.');
      return;
    }
    // Reset stats
    tracking=true; maxSpd=0; totalSpd=0; spdCount=0; durSec=0;

    document.getElementById('start-btn').textContent='⏹  STOP TRACKING';
    document.getElementById('start-btn').className='start-btn stop';
    document.getElementById('conn-dot').className='conn-dot connected';
    document.getElementById('conn-label').textContent='TRACKING AKTIF';
    document.getElementById('driver-id-label').textContent='ID: '+(document.getElementById('cfg-driver').value||'DRV-001');

    // Mulai GPS watch
    watchId=navigator.geolocation.watchPosition(onPosition, onGeoError,{
      enableHighAccuracy:true,
      maximumAge:2000,
      timeout:15000
    });

    // Mulai kirim data ke server
    const ivl=parseInt(document.getElementById('cfg-interval').value)||5000;
    sendData(); // kirim langsung pertama kali
    sendTimer=setInterval(sendData, ivl);

    // Timer durasi
    durTimer=setInterval(()=>{durSec++;updateMetrics();},1000);

    document.getElementById('spd-zone').textContent='Mendeteksi GPS...';
    document.getElementById('spd-zone').className='speed-zone safe';

  }else{
    tracking=false;
    if(watchId!=null){navigator.geolocation.clearWatch(watchId);watchId=null;}
    clearInterval(sendTimer); clearInterval(durTimer);
    sendTimer=null; durTimer=null;

    document.getElementById('start-btn').textContent='MULAI TRACKING';
    document.getElementById('start-btn').className='start-btn start';
    document.getElementById('conn-dot').className='conn-dot';
    document.getElementById('conn-label').textContent='SESI SELESAI';
    document.getElementById('spd-num').textContent='0';
    document.getElementById('spd-zone').textContent='Sesi selesai';
    document.getElementById('spd-zone').className='speed-zone safe';
    document.getElementById('spd-num').style.color='var(--text)';
    drawGauge(0);
  }
}

// Prevent screen lock saat tracking (jika browser support)
let wakeLock=null;
async function requestWakeLock(){
  if('wakeLock' in navigator){
    try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
  }
}
document.getElementById('start-btn').addEventListener('click',()=>{
  if(!tracking) requestWakeLock();
  else if(wakeLock){wakeLock.release();wakeLock=null;}
});
</script>
